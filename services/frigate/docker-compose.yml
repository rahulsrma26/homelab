services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    shm_size: "${SHM_SIZE:-512mb}"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${CONFIG_DIR:-./config}:/config
      - ${STORAGE_DIR:-/mnt/nvr}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 500000000
    ports:
      - "${HTTP_PORT:-8971}:8971"
      - "${RTSP_PORT:-8554}:8554"
      - "${WEBRTC_PORT:-8555}:8555/tcp"
      - "${WEBRTC_PORT:-8555}:8555/udp"
      - "5000:5000" # Internal unauthenticated access for Home Assistant. Expose carefully.
    env_file: .env
    environment:
      FRIGATE_RTSP_PASSWORD: "${FRIGATE_RTSP_PASSWORD:-changeme}"
