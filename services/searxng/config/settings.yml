use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true

redis:
  url: redis://localhost:6379/0

ui:
  default_locale: "en"
  default_theme: simple
  theme_args:
    simple_style: dark
  infinite_scroll: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
