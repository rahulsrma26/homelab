services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${PORT:-8096}:8096/tcp"
      - "7359:7359/udp"
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /mnt/media
        target: /media
        read_only: true
    environment:
      JELLYFIN_PublishedServerUrl: "${PUBLISHED_URL:-}"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
